services:
  nezha-dash-pro:
    container_name: nezha-dash-pro
    image: clowlove/nezha-dash-pro:latest
    volumes:
      - ./.env:/app/.env
      - nezha-data:/app/data
    restart: always
    ports:
      - "4123:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  nezha-data:
