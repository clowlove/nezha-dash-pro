apiVersion: v1
kind: ConfigMap
metadata:
  name: nezha-config
  namespace: nezha
  labels:
    app: nezha-dash-pro
data:
  APP_ENV: "production"
  APP_PORT: "8080"
  LOG_LEVEL: "info"
  METRICS_ENABLED: "true"
  ALERT_COOLDOWN_SECONDS: "300"
  ALERT_AUTO_RESOLVE_SECONDS: "600"
  THEME_DEFAULT: "dark"
  SESSION_TIMEOUT: "3600"
---
apiVersion: v1
kind: Secret
metadata:
  name: nezha-secrets
  namespace: nezha
  labels:
    app: nezha-dash-pro
type: Opaque
stringData:
  DB_PATH: "/data/nezha.db"
  JWT_SECRET: "change-me-in-production"
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
  REDIS_PASSWORD: ""
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  S3_BUCKET: "nezha-backups"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nezha-dash-pro
  namespace: nezha
  labels:
    app: nezha-dash-pro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nezha-dash-pro
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nezha-dash-pro
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nezha-dash-pro
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: nezha-dash-pro
          image: nezha/dash-pro:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nezha-config
            - secretRef:
                name: nezha-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nezha-data-pvc
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - nezha-dash-pro
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nezha-data-pvc
  namespace: nezha
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
